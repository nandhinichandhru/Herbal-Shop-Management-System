<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <title>Login Page</title>
  <style>
    body {
      font-family: "Playfair Display", serif;
      background: none;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("images/vecteezy_charming-display-of-dried-flowers-and-herbs-in-glass-jars-on_55302710.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      z-index: -1;
      pointer-events: none;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 35px 40px;
      border-radius: 15px;
      border: 2px solid rgba(0, 0, 0, 0.5);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      width: 350px;
      transition: transform 0.3s ease;
    }

    .login-box:hover {
      transform: scale(1.015);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #2c3e50;
    }

    .login-box label {
      font-weight: 600;
      font-size: 16px;
      color: black;
    }

    .login-box input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .login-box input:focus {
      border-color: black;
      outline: none;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 45px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      cursor: pointer;
      width: 24px;
      height: 24px;
      color: #555;
    }

    .toggle-password svg {
      width: 100%;
      height: 100%;
    }

    .login-box button {
      width: 100%;
      background: #d3b1c2;
      color: black;
      border: none;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .login-box button:hover {
      background: #d3b1c2;
      transform: scale(1.05);
    }

    .login-box .links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .login-box .links a {
      color: black;
      text-decoration: none;
      margin: 0 5px;
      transition: color 0.2s;
    }

    .login-box .links a:hover {
      text-decoration: underline;
      color: black;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form action="login.php" method="POST">
    <label for="email">Email:</label>
    <input type="text" name="email" id="email" placeholder="Enter email" required />

    <label for="password">Password:</label>
    <div class="password-wrapper">
      <input type="password" name="password" id="password" placeholder="Enter password" required />
      <span class="toggle-password" onclick="togglePassword()">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path id="eye-path" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
          <circle id="eye-circle" cx="12" cy="12" r="3"/>
        </svg>
      </span>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="links">
    <a href="register.html">Register</a> |
    <a href="forgot-password.php">Forgot Password?</a>
  </div>
</div>

<script>
  let passwordVisible = false;

  function togglePassword() {
    const pwd = document.getElementById("password");
    const path = document.getElementById("eye-path");
    const circle = document.getElementById("eye-circle");

    passwordVisible = !passwordVisible;
    pwd.type = passwordVisible ? "text" : "password";

    if (passwordVisible) {
      // Eye closed
      path.setAttribute("d", "M17.94 17.94A10.97 10.97 0 0112 19c-7 0-11-7-11-7a21.33 21.33 0 014.22-5.06M3 3l18 18");
      circle.style.display = "none";
    } else {
      // Eye open
      path.setAttribute("d", "M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z");
      circle.style.display = "inline";
    }
  }
</script>

</body>
</html>
